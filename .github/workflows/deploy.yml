name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scan repository for secrets
        run: npm run check:secrets

      - name: Validate content
        run: npm run validate:content

      - name: Type-check application
        run: npm run typecheck

      - name: Lint application
        run: npm run lint

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npx playwright test --project=chromium-en --grep-invert "screenshot-"

      - name: Generate static site
        run: npm run generate
        env:
          NITRO_PRESET: github-pages
          NUXT_APP_BASE_URL: /pesaba.com/
          NUXT_PUBLIC_SITE_URL: https://razavioo.github.io/pesaba.com
          NUXT_PUBLIC_SITE_INDEXABLE: false
          NUXT_PUBLIC_CONTACT_FORM_ENABLED: false

      - name: Check client bundle budget
        run: npm run check:bundle

      - name: Validate generated artifact
        run: npm run validate:output

      - name: Disable Jekyll
        run: touch .output/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
