services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pesaba_cms
      POSTGRES_USER: pesaba
      POSTGRES_PASSWORD: pesaba-local-only
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesaba -d pesaba_cms"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pesaba-local
      MINIO_ROOT_PASSWORD: pesaba-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 pesaba-local pesaba-local-only &&
      mc mb --ignore-existing local/pesaba-media &&
      mc anonymous set download local/pesaba-media"

  cms-migrate:
    build:
      context: .
      target: cms-migrate
    environment:
      DATABASE_URL: postgresql://pesaba:pesaba-local-only@postgres:5432/pesaba_cms?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  cms:
    build:
      context: .
      target: cms
    environment:
      DATABASE_URL: postgresql://pesaba:pesaba-local-only@postgres:5432/pesaba_cms?schema=public
      CMS_API_PORT: 4000
      CMS_WEB_ORIGIN: http://localhost:3000
      CMS_SESSION_SECRET: ${CMS_SESSION_SECRET:-local-development-session-secret-change-before-production-2026}
      CMS_S3_ENDPOINT: http://minio:9000
      CMS_S3_REGION: us-east-1
      CMS_S3_BUCKET: pesaba-media
      CMS_S3_ACCESS_KEY: pesaba-local
      CMS_S3_SECRET_KEY: pesaba-local-only
      CMS_S3_PUBLIC_URL: http://localhost:9000/pesaba-media
    ports:
      - "4400:4000"
    depends_on:
      cms-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/v1/public/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: .
      target: web
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_CMS_API_URL: http://localhost:4400/api/v1
      NUXT_CMS_API_INTERNAL_URL: http://cms:4000/api/v1
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
      NUXT_PUBLIC_SITE_INDEXABLE: "false"
      NUXT_CONTACT_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      cms:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
