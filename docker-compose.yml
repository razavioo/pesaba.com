services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pesaba_cms
      POSTGRES_USER: pesaba
      POSTGRES_PASSWORD: pesaba-local-only
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesaba -d pesaba_cms"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pesaba-local
      MINIO_ROOT_PASSWORD: pesaba-local-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 pesaba-local pesaba-local-only &&
      mc mb --ignore-existing local/pesaba-media &&
      mc anonymous set download local/pesaba-media"

volumes:
  postgres_data:
  minio_data:
