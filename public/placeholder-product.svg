<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Product image coming soon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1422"/>
      <stop offset="100%" stop-color="#06090F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#94A1BD" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" fill="url(#dots)"/>
  <rect width="400" height="300" fill="url(#glow)"/>
  <g transform="translate(200 130)" fill="none" stroke="#0EA5E9" stroke-opacity="0.55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-44" y="-26" width="88" height="52" rx="6"/>
    <line x1="-44" y1="-12" x2="44" y2="-12"/>
    <circle cx="-30" cy="-19" r="2" fill="#0EA5E9" fill-opacity="0.8" stroke="none"/>
    <circle cx="-22" cy="-19" r="2" fill="#0EA5E9" fill-opacity="0.4" stroke="none"/>
    <rect x="-34" y="2" width="14" height="18" rx="1.5"/>
    <rect x="-14" y="2" width="14" height="18" rx="1.5"/>
    <rect x="6" y="2" width="14" height="18" rx="1.5"/>
    <rect x="26" y="2" width="14" height="18" rx="1.5"/>
  </g>
  <text x="200" y="200" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="3" fill="#94A1BD" fill-opacity="0.7">PHOTO COMING SOON</text>
</svg>
